# RWA Arbitrage Bot Configuration

mode: "PAPER"  # PAPER or LIVE

# 대상 상품
# NOTE: perp_ticker는 Hyperliquid API universe의 실제 name 필드값 사용
#       (dex:"xyz" 조회 시 "xyz:" 프리픽스 포함)
products:
  wti:
    perp_ticker: "xyz:CL"       # trade.xyz WTI 퍼프 (API name)
    futures_symbol: "MCL"       # CME Micro WTI (100배럴/계약)
    contract_size: 100           # 1 MCL = 100배럴 = perp 100단위
    min_order_size: 1
    futures_fee_per_contract: 2.50  # MCL 편도 수수료 (거래소+브로커)

# KIS 종목코드 매핑 (settings에서 관리, API키는 secrets.yaml)
# NOTE: kis_symbol은 KIS 종목코드 (근월물, 매월 롤오버 필요)
kis_symbol_map:
  wti: "MCLK26"              # MCL 2026년 5월물 (프론트 월물)
  # NOTE: trade.xyz oracle는 CME 프론트 월물 기반
  #   매월 5~10번째 영업일: 근월물→차월물 가중평균 롤오버
  #   MCLK26(5월물) 만기: 2026-04-21경
  #   4월 7~14일경 롤오버 시작 → MCLM26(6월물)으로 수동 교체 필요

# Hyperliquid 설정
hyperliquid:
  use_testnet: false             # trade.xyz HIP-3 퍼프는 메인넷에만 존재
  perp_dex: "xyz"                # trade.xyz의 HIP-3 perp DEX 이름
  ws_reconnect_delay: 5         # 초
  ws_ping_interval: 30          # 초

# 키움증권 설정 (KIS 미활성 시 mock으로 동작)
kiwoom:
  use_mock: true                # 모의투자 모드
  server_type: "mock"           # mock 또는 real

# KIS (한국투자증권) 설정
kis:
  enabled: true                # 실제 CME 호가 수신 활성화
  is_paper: false              # 실투자 서버
  cme_realtime: true           # CME/NYMEX 유료시세 신청 완료

# 전략 파라미터
strategy:
  # 베이시스 계산
  basis_window_hours: 24        # 24시간 window → 안정적 mean/std 확보
  basis_std_multiplier: 3.0     # σ 배수: 3.0 = 상위 0.1%에서만 진입

  # 진입/청산
  entry_threshold_bps: 25       # 최소 진입 베이시스 (bp), 왕복 수수료 ~7bp × 3.5배
  exit_threshold_bps: 4         # 청산 임계값 (bp), mean 근처까지 기다림
  target_profit_bps: 20         # 목표 수익 (bp)
  max_hold_hours: 8             # 최대 보유 시간 (충분히 기다림)

  # 펀딩레이트
  funding_rate_weight: 1.0      # 펀딩 수익 반영 비율
  min_funding_advantage_bps: 2  # 최소 펀딩 유리 조건

# 리스크 관리
risk:
  max_position_usd: 50000       # 최대 포지션 (USD)
  max_position_contracts: 2     # 최대 CME 계약 수
  max_margin_usage_pct: 50      # 최대 마진 사용률 (%)
  max_slippage_bps: 5           # 최대 슬리피지 (bp), 좁은 스프레드 환경
  max_daily_loss_usd: 1000      # 일일 최대 손실 (보수적)
  emergency_close_threshold: 40  # 긴급 청산 베이시스 (bp), 관측 최대 ~45bp

  # 롤오버
  rollover_start_day: 5         # 롤오버 시작 영업일
  rollover_end_day: 10          # 롤오버 종료 영업일
  rollover_position_reduce_pct: 50  # 롤 기간 포지션 축소율 (%)

# 데이터 저장
database:
  type: "sqlite"
  path: "data/arbitrage.db"

# 알림
notification:
  telegram:
    enabled: false
    bot_token: ""               # secrets.yaml에서 로드
    chat_id: ""

# 로깅
logging:
  level: "INFO"
  file: "logs/arbitrage.log"
  max_size_mb: 100
  backup_count: 5
