# RWA Arbitrage Bot Configuration

mode: "PAPER"  # PAPER or LIVE

# 대상 상품
# NOTE: perp_ticker는 Hyperliquid API universe의 실제 name 필드값 사용
#       (dex:"xyz" 조회 시 "xyz:" 프리픽스 포함)
products:
  wti:
    perp_ticker: "xyz:CL"       # trade.xyz WTI 퍼프 (API name)
    futures_symbol: "MCL"       # CME Micro WTI (100배럴/계약)
    contract_size: 100           # 1 MCL = 100배럴 = perp 100단위
    min_order_size: 1
    futures_fee_per_contract: 2.50  # MCL 편도 수수료 (거래소+브로커)

# KIS 종목코드 매핑 (settings에서 관리, API키는 secrets.yaml)
# NOTE: kis_symbol은 KIS 종목코드 (근월물, 매월 롤오버 필요)
kis_symbol_map:
  wti: "MCLM26"              # MCL 2026년 6월물 (프론트 월물, effective 2026-04-14 roll 완료 후)
  # NOTE: trade.xyz oracle는 CME 프론트 월물 기반
  #   매월 5~10번째 영업일: 근월물→차월물 가중평균 롤오버
  #   MCLM26(6월물) 만기: 2026-05-20경
  #   다음 롤오버 window: 2026-05-07 ~ 2026-05-14 (5월 5~10 영업일)
  #   P1 자동 롤오버: src/strategy/rollover.py 의 get_active_contract()가 계산
  #     매시간 watch loop가 desired != current 감지 시 resubscribe

# Hyperliquid 설정
hyperliquid:
  use_testnet: false             # trade.xyz HIP-3 퍼프는 메인넷에만 존재
  perp_dex: "xyz"                # trade.xyz의 HIP-3 perp DEX 이름
  ws_reconnect_delay: 5         # 초
  ws_ping_interval: 30          # 초

# 키움증권 설정 (KIS 미활성 시 mock으로 동작)
kiwoom:
  use_mock: true                # 모의투자 모드
  server_type: "mock"           # mock 또는 real

# KIS (한국투자증권) 설정
kis:
  enabled: true                # 실제 CME 호가 수신 활성화
  is_paper: false              # 실투자 서버
  cme_realtime: true           # CME/NYMEX 유료시세 신청 완료

# 전략 파라미터 (2026-04-02 M7: 스프레드 수렴 기반 청산)
# 원리: perp는 futures(인덱스) 가격으로 수렴해야 함. 수렴까지 펀딩 수취하며 대기.
strategy:
  # 베이시스 계산 (진입 시그널용)
  basis_window_hours: 24        # 24h window → mean/std 안정화
  basis_std_multiplier: 3.0     # 3σ = 극단값에서만 진입

  # 진입
  entry_threshold_bps: 20       # exec basis가 이 값 이상 벌어져야 진입 (수수료 ~13bp + 슬리피지 버퍼)
  min_abs_entry_bps: 10         # 절대값 floor: |exec_basis| 이 값 미만이면 진입 차단 (통계신호와 무관)
                                # (post-rollover 30건 분석: <10bp는 14% WR -$202, 10bp+는 94% WR +$199)

  # 청산 — 스프레드 수렴 기반
  convergence_target_bps: 3     # spread ≤ 3bp면 수렴 완료 → 청산
  max_hold_hours: 48            # 수렴 대기 + 펀딩 수취 (최대 48시간)
  # emergency_close_threshold은 risk 섹션에서 관리

  # 펀딩레이트
  funding_rate_weight: 1.0      # 펀딩 수익 반영 비율
  min_funding_advantage_bps: 2  # 최소 펀딩 유리 조건

  # CME 장 시간 가드 (M9 대비 보수적 엔트리/엑싯)
  cme_closed_skip_entry: true       # CME 폐장 중엔 신규 진입 차단 (futures leg 체결 불가)
  pre_close_flatten_minutes: 30     # 마감 30분 전부터 진입 차단 + 보유 포지션 flatten
  flatten_threshold_hours: 4.0      # 다가오는 휴장이 이 시간 이상(주말/휴일)이면 flatten 발동
                                     # Mon-Thu 16:00-17:00 CT 일일 1h break는 threshold 미달 → 보유 유지

# 리스크 관리
risk:
  max_position_usd: 50000       # 최대 포지션 (USD)
  max_position_contracts: 2     # 최대 CME 계약 수
  max_margin_usage_pct: 50      # 최대 마진 사용률 (%)
  max_slippage_bps: 5           # 최대 슬리피지 (bp), 좁은 스프레드 환경
  max_daily_loss_usd: 1000      # 일일 최대 손실 (보수적)
  emergency_close_threshold: 40  # 긴급 청산 베이시스 (bp), 관측 최대 ~45bp

  # 롤오버
  rollover_start_day: 5         # 롤오버 시작 영업일
  rollover_end_day: 10          # 롤오버 종료 영업일
  rollover_position_reduce_pct: 50  # 롤 기간 포지션 축소율 (%)

# 데이터 저장
database:
  type: "sqlite"
  path: "data/arbitrage.db"

# 알림
notification:
  telegram:
    enabled: false
    bot_token: ""               # secrets.yaml에서 로드
    chat_id: ""

# 로깅
logging:
  level: "INFO"
  file: "logs/arbitrage.log"
  max_size_mb: 100
  backup_count: 5
